name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  static:
    name: "Lint, CGL & PHPStan (PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2', '8.3', '8.4' ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: PHP Lint
        run: find Classes Tests -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

      - name: Coding Standards
        run: composer ci:php:cs

      - name: PHPStan
        run: composer ci:php:stan

      - name: Rector (advisory)
        run: composer ci:php:rector
        continue-on-error: true

  unit:
    name: "Unit Tests (PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2', '8.3', '8.4' ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Unit Tests
        run: composer ci:test:unit

  functional:
    name: "Functional Tests (PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2', '8.3', '8.4' ]
    env:
      typo3DatabaseDriver: pdo_sqlite
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, pdo_sqlite, zip
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Functional Tests (SQLite)
        run: composer ci:test:functional
