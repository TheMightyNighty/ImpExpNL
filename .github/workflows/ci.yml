name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  static:
    name: "Lint, CGL & PHPStan (PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2', '8.3' ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: PHP Lint
        run: find Classes Tests -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

      - name: Coding Standards
        run: composer ci:php:cs

      - name: PHPStan
        run: composer ci:php:stan

      - name: Rector (advisory)
        run: composer ci:php:rector
        continue-on-error: true

  unit:
    name: "Unit Tests (PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2', '8.3' ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Unit Tests
        run: composer ci:test:unit

  functional:
    name: "Functional Tests (PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2', '8.3' ]
    env:
      typo3DatabaseDriver: pdo_sqlite
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, pdo_sqlite, zip
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Functional Tests (SQLite)
        run: composer ci:test:functional

  functional-mariadb:
    name: "Functional Tests (MariaDB ${{ matrix.mariadb }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mariadb: [ '10.11', '11.4' ]
    services:
      mariadb:
        image: mariadb:${{ matrix.mariadb }}
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      typo3DatabaseDriver: mysqli
      typo3DatabaseHost: 127.0.0.1
      typo3DatabasePort: 3306
      typo3DatabaseName: typo3_ci
      typo3DatabaseUsername: root
      typo3DatabasePassword: root
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl, mysqli, pdo_mysql, zip
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Functional Tests (MariaDB)
        run: php -d memory_limit=512M vendor/bin/phpunit -c phpunit.functional.xml
